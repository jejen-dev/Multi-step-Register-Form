<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Multi-Step Form</title>

  <meta name="description" content="Multi-step Register Form">
  <meta name="keywords" content="form, multi-step, step, multi">
  <meta name="author" content="jejen-dev">
  <meta name="robots" content="index, follow">

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <link rel="icon" type="image/x-icon" href="resources/favicon.ico">
</head>

<body>
  <form id="multi-step-form">

    <div class="container">

      <div class="step1">
        <p class="t1">Register</p><br>
        <div class="input-group">
          <div>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" placeholder="Enter your name" maxlength="50">
          </div>
          <div>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="Example@gmail.com" maxlength="60">
          </div>
        </div>
      </div>

      <div class="step2">
        <fieldset class="input-group">
          <legend class="t1">Which topics you are interested in?</legend>

          <div class="checkbox-wrapper">
            <input type="checkbox" id="topic-software" name="topics" value="Software Development">
            <label for="topic-software">Software Development</label>
          </div>

          <div class="checkbox-wrapper">
            <input type="checkbox" id="topic-ux" name="topics" value="User Experience">
            <label for="topic-ux">User Experience</label>
          </div>

          <div class="checkbox-wrapper">
            <input type="checkbox" id="topic-graphic" name="topics" value="Graphic Design">
            <label for="topic-graphic">Graphic Design</label>
          </div>

        </fieldset>
      </div>

      <div class="step3">
        <p class="t1">Summary</p><br>
        <div>
          <p>Name: <span id="summary-name">-</span></p>
          <p>Email: <span id="summary-email">-</span></p>
        </div>
        <div>
          <p style="margin-top: 18px;">Topics:</p>
          <ul id="summary-topic">
            <li>-</li>
          </ul>
        </div>
      </div>

      <br><br>

      <div class="continue">
        <button type="button" class="btn" id="next-btn">Continue</button>
      </div>

    </div>

    <br>

    <div class="counter">
      <div class="step-text" id="step-label">Step 1 of 3</div>
      <div class="dots-container" id="dots-wrapper">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

  </form>
  <div id="toast"></div>
</body>

</html>
